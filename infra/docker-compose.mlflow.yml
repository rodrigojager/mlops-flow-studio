services:
  mlflow-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mlflow
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
    ports:
      - "55432:5432"
    volumes:
      - mlflow-db-data:/var/lib/postgresql/data

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.1.1
    command:
      - mlflow
      - server
      - --host
      - 0.0.0.0
      - --port
      - "5000"
      - --backend-store-uri
      - postgresql://mlflow:mlflow@mlflow-db:5432/mlflow
      - --artifacts-destination
      - /mlflow/artifacts
    depends_on:
      - mlflow-db
    ports:
      - "5000:5000"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts

volumes:
  mlflow-db-data:
  mlflow-artifacts:
