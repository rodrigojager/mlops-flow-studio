kind: orchestration_manifest
contract: mlops-flow-v1
projectId: support_ticket_classification
projectVersion: 0.1.0
runtimeId: support_ticket_classification-runtime
generatedAt: 2026-07-01T22:00:10.044Z
optional: true
requirementsFile: requirements-orchestration.txt
runners:
  - id: prefect
    label: Prefect
    entrypoint: orchestration/prefect_flow.py
    flows:
      - name: runtime_readiness_flow
        mode: read_only
        endpoints:
          - GET /health
          - GET /metadata
          - GET /models/active
          - GET /metrics/runtime
      - name: controlled_retraining_request_flow
        mode: mutable_confirmed
        endpoints:
          - POST /retraining/requests
          - POST /retraining/requests/{request_id}/approve
  - id: celery
    label: Celery
    entrypoint: orchestration/celery_app.py
    tasks:
      - name: mlops_runtime.health
        mode: read_only
        endpoints:
          - GET /health
      - name: mlops_runtime.readiness
        mode: read_only
        endpoints:
          - GET /health
          - GET /metadata
          - GET /models/active
          - GET /metrics/runtime
      - name: mlops_runtime.request_retraining
        mode: mutable_confirmed
        endpoints:
          - POST /retraining/requests
          - POST /retraining/requests/{request_id}/approve
safety:
  dependenciesAreOptional: true
  mutableTasksRequireConfirm: true
  secretsByReferenceOnly: true
  defaultRuntimeBaseUrl: env:RUNTIME_BASE_URL
  celeryBrokerUrl: env:CELERY_BROKER_URL
  celeryResultBackend: env:CELERY_RESULT_BACKEND
