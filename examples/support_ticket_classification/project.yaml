id: support_ticket_classification
name: Classificação de Tickets de Suporte
version: 0.1.0
contract: mlops-flow-v1
description: Exemplo multiclasse com fontes CSV, SQL e API externa, modelos candidatos e decisor determinístico.
problem:
  type: multiclass_classification
  target: classe_final
  classes:
    - classe_01
    - classe_02
    - classe_03
    - classe_04
    - classe_05
    - classe_06
    - classe_07
    - classe_08
    - classe_09
    - classe_10
    - classe_11
    - classe_12
    - classe_13
    - classe_14
    - classe_15
    - classe_16
    - classe_17
    - classe_18
    - classe_19
    - classe_20
    - classe_21
    - classe_22
    - classe_23
    - classe_24
    - classe_25
    - classe_26
    - classe_27
  classDependencies:
    - parent: classe_01
      child: classe_02
      condition: classe_02 só é válida quando classe_01 foi escolhida na etapa ampla.
execution:
  profile: auto
  gpu:
    minVramGb: 4
    cudaRequired: false
    fallback: cpu
metrics:
  primary: f1_macro
  secondary:
    - accuracy
    - f1_weighted
    - precision_macro
    - recall_macro
    - latency_p95_ms
dataSources:
  - id: tickets_csv
    type: csv
    label: CSV de tickets rotulados
    sensitive: true
    csv:
      path: data/tickets.csv
      delimiter: ","
      hasHeader: true
      encoding: utf-8
    schema: {}
    sensitiveFields:
      - email
      - documento
      - telefone
  - id: warehouse_sql
    type: sql
    label: Histórico SQL
    sql:
      connectionRef: env:WAREHOUSE_DATABASE_URL
      query: SELECT id, texto, classe_final, criado_em FROM tickets_treinamento
      previewLimit: 50
    schema: {}
    sensitiveFields: []
  - id: support_api
    type: api
    label: API externa de suporte
    api:
      method: GET
      url: https://api.example.local/tickets
      headers:
        Authorization: env:SUPPORT_API_TOKEN
      pagination:
        mode: page
        pageParam: page
      timeoutSeconds: 30
      mocks:
        - id: support_api_contract
          description: Resposta sintética para preview e treino seguro sem rede externa.
          request:
            method: GET
            path: /tickets
          response:
            httpStatus: 200
            body:
              - id: 1
                text: classe_01 boleto assinatura atraso financeiro
                classe_final: classe_01
                email: mock-a@example.com
              - id: 2
                text: classe_02 senha acesso bloqueado portal
                classe_final: classe_02
                email: mock-b@example.com
    schema: {}
    sensitiveFields: []
pipelineRef: pipeline.flow.json
promotionPolicy:
  id: default-promotion-policy
  mode: manual_approval
  baseline: active_model
  rules:
    - kind: group
      id: qualidade_minima
      label: Qualidade mínima
      combinator: all
      severity: block
      rules:
        - kind: metric
          id: f1_macro_minimo
          label: F1 macro mínimo
          left:
            metric: f1_macro
            scope: candidate
            phase: validation
          operator: gte
          value: 0.78
          compareTo:
            metric: f1_macro
            scope: active
            phase: validation
          neutralBand: 0.01
          severity: block
          rationale: Modelo novo só deve substituir o atual com ganho relevante de F1 macro.
        - kind: metric
          id: accuracy_minima
          label: Accuracy mínima
          left:
            metric: accuracy
            scope: candidate
            phase: validation
          operator: gte
          value: 0.75
          neutralBand: 0.005
          severity: review
          rationale: Accuracy ajuda a explicar resultado, mas não decide sozinha.
    - kind: metric
      id: latencia_p95_aceitavel
      label: Latência p95 aceitável
      left:
        metric: latency_p95_ms
        scope: runtime
        phase: runtime
      operator: lte
      value: 750
      neutralBand: 25
      severity: review
      rationale: O runtime precisa continuar operável no notebook e em container.
runtime:
  apiName: Support Ticket Classifier API
  routePrefix: ""
  persistence:
    primary: postgres
    databaseUrlRef: env:DATABASE_URL
  dashboard:
    enabled: true
    pages:
      - overview
      - data
      - models
      - prediction
      - monitoring
      - events
      - docs
    highlightedMetrics:
      - f1_macro
      - accuracy
      - latency_p95_ms
  mlflow:
    enabled: false
    trackingUriRef: env:MLFLOW_TRACKING_URI
    experimentName: support_ticket_classification
    registryEnabled: false
modelCard:
  intendedUse: Classificar tickets em 27 classes e expor versão, métricas, evidências de promoção e logs de predição.
  limitations:
    - Exemplo inicial não contém dados reais.
    - Embeddings/BERT ficam opcionais por causa do limite de VRAM.
  monitoring:
    - prediction_logs
    - runtime_metrics
    - drift_basic
  riskLevel: medium
sensitiveFields:
  - email
  - documento
  - telefone
dependencies:
  - scikit-learn>=1.5,<2
  - xgboost>=2,<3
owners: []
